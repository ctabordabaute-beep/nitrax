<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrax · Nitro gratis · by Aqirax</title>
    <!-- Meta tags para embed de Discord (color morado) -->
    <meta property="og:title" content="🌟 Nitrax · Regala Nitro · by Aqirax" />
    <meta property="og:description" content="Web que regala Nitro y vende cuentas. Desarrollado por Aqirax." />
    <meta property="og:color" content="#9b59b6" />
    <meta name="theme-color" content="#9b59b6" />
    <!-- IMAGEN ACTUALIZADA con parámetro anti-caché -->
    <meta property="og:image" content="https://i.imgur.com/paAuSmv.jpeg?v=20260702" />
    <meta property="og:url" content="https://nitrax.xyz" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
            background-size: 400% 400%;
            animation: gradienteMovil 14s ease infinite alternate;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradienteMovil {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Fondo con partículas mejorado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(3px 3px at 20% 30%, rgba(255,255,255,0.6), transparent),
                radial-gradient(3px 3px at 40% 70%, rgba(255,255,255,0.5), transparent),
                radial-gradient(3px 3px at 60% 20%, rgba(255,255,255,0.6), transparent),
                radial-gradient(3px 3px at 80% 80%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 10% 90%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 90% 10%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 50% 50%, rgba(255,255,255,0.4), transparent);
            background-size: 250px 250px;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
            animation: parpadeo 10s infinite alternate;
        }

        @keyframes parpadeo {
            0% { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }

        /* Partículas flotantes adicionales (JS) */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(3px);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.2);
            animation: flotarParticula var(--duracion) ease-in-out infinite alternate;
        }

        @keyframes flotarParticula {
            0% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2); opacity: 0.8; }
        }

        /* Tarjeta principal - estilo "pro" mejorado */
        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 72px;
            padding: 3.5rem 3rem;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
        }

        .card:hover {
            transform: scale(1.03) translateY(-12px);
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.3);
        }

        /* Logo / icono principal con animación mejorada */
        .logo-icon {
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 0 40px rgba(155, 89, 182, 0.9), 0 0 80px rgba(155, 89, 182, 0.4);
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: flotar 3.5s ease-in-out infinite;
            background: linear-gradient(135deg, #fff, #e9d5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(155, 89, 182, 0.5));
        }

        @keyframes flotar {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Título principal con efecto neón mejorado */
        .titulo-principal {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: white;
            text-shadow: 
                0 0 30px rgba(155, 89, 182, 0.6),
                0 0 60px rgba(155, 89, 182, 0.4),
                0 0 100px rgba(155, 89, 182, 0.2);
            margin-bottom: 0.3rem;
            line-height: 1.1;
            word-break: break-word;
            position: relative;
        }

        .titulo-principal span {
            background: linear-gradient(135deg, #ffffff 0%, #f3e8ff 50%, #e9d5ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            position: relative;
        }

        .titulo-principal::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #a78bfa, transparent);
            border-radius: 100%;
            filter: blur(2px);
        }

        .badge {
            display: inline-block;
            background: rgba(155, 89, 182, 0.3);
            backdrop-filter: blur(10px);
            padding: 0.4rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 2rem;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
        }

        .badge i {
            margin-right: 10px;
            color: #fbbf24;
            animation: parpadeoIcono 2s ease-in-out infinite;
        }

        @keyframes parpadeoIcono {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        /* Descripción mejorada */
        .descripcion {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #1e1b2e;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 2rem 2.2rem;
            border-radius: 40px;
            margin: 1.8rem 0 2.5rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }

        .descripcion::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(167, 139, 250, 0.05), transparent 70%);
            animation: rotarFondo 20s linear infinite;
        }

        @keyframes rotarFondo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .descripcion strong {
            color: #6b21a8;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.7);
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin: 0 4px;
            position: relative;
            z-index: 1;
        }

        .descripcion .highlight {
            color: #7c3aed;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .descripcion i {
            margin-right: 8px;
            color: #7c3aed;
            position: relative;
            z-index: 1;
        }

        /* Botones mejorados */
        .botones {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 1.1rem 2.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.15rem;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            color: #2d1b3d;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            flex: 1;
            min-width: 180px;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.3), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn i {
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: scale(1.2) rotate(-5deg);
        }

        .btn-primario {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: 1px solid #a78bfa;
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.5);
            font-weight: 800;
        }

        .btn-primario:hover {
            transform: scale(1.06) translateY(-5px);
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.6);
        }

        .btn-discord {
            background: linear-gradient(135deg, #5865F2, #4752c4);
            color: white;
            border: 1px solid #7984f5;
            box-shadow: 0 12px 35px rgba(88, 101, 242, 0.5);
            font-weight: 800;
        }

        .btn-discord:hover {
            transform: scale(1.06) translateY(-5px);
            box-shadow: 0 20px 50px rgba(88, 101, 242, 0.6);
        }

        .btn-secundario {
            background: rgba(255, 215, 255, 0.25);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-secundario:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05) translateY(-5px);
        }

        /* Footer / créditos mejorado */
        .footer-note {
            margin-top: 3rem;
            font-size: 1rem;
            color: #2d1b3d;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.9rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .footer-note:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.02);
        }

        .footer-note i {
            margin: 0 8px;
            color: #7c3aed;
        }

        .footer-note a {
            color: #4c1d95;
            text-decoration: none;
            font-weight: 800;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            padding-bottom: 2px;
        }

        .footer-note a:hover {
            color: #2d0b66;
            border-bottom: 2px solid #7c3aed;
        }

        /* Efecto de brillo en los bordes */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 74px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.3), transparent, rgba(167, 139, 250, 0.3));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Responsive mejorado */
        @media (max-width: 768px) {
            .card {
                padding: 2.5rem 1.8rem;
                border-radius: 48px;
            }
            .titulo-principal {
                font-size: 4rem;
            }
            .logo-icon {
                font-size: 4rem;
            }
            .badge {
                font-size: 0.9rem;
                padding: 0.3rem 1.5rem;
            }
            .descripcion {
                font-size: 1rem;
                padding: 1.5rem 1.5rem;
            }
            .btn {
                padding: 0.9rem 1.8rem;
                font-size: 1rem;
                min-width: 140px;
            }
            .botones {
                gap: 1rem;
            }
            .footer-note {
                font-size: 0.85rem;
                padding: 0.7rem 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.2rem;
                border-radius: 32px;
            }
            .titulo-principal {
                font-size: 3rem;
            }
            .logo-icon {
                font-size: 3rem;
            }
            .btn {
                min-width: 100%;
                padding: 0.8rem 1.5rem;
                font-size: 0.95rem;
            }
            .botones {
                flex-direction: column;
                width: 100%;
            }
            .descripcion {
                font-size: 0.95rem;
                padding: 1.2rem;
            }
            .badge {
                font-size: 0.8rem;
                padding: 0.2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Icono animado -->
        <div class="logo-icon">
            <i class="fas fa-gem"></i>
        </div>

        <!-- Título principal -->
        <h1 class="titulo-principal">
            <span>Nitrax</span>
        </h1>

        <div class="badge">
            <i class="fas fa-bolt"></i> REGALA NITRO · VENTA DE CUENTAS
        </div>

        <div class="descripcion">
            <i class="fas fa-gift"></i> <strong>Nitrax</strong> es la web que <strong>regala Nitro</strong> 
            y también <strong>vende cuentas</strong> con descuento. 
            <br><span class="highlight"><i class="fas fa-rocket"></i> ¡Consigue tu Nitro gratis ahora!</span>
        </div>

        <div class="botones">
            <a href="#" class="btn btn-primario" onclick="event.preventDefault(); alert('🎁 Nitro gratis en camino...');">
                <i class="fas fa-gift"></i> Obtener Nitro
            </a>
            <a href="#" class="btn btn-secundario" onclick="event.preventDefault(); alert('🛒 Tienda de cuentas disponible');">
                <i class="fas fa-store"></i> Comprar cuenta
            </a>
            <a href="https://aqirax.net" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Unirse a Discord
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-code"></i> Desarrollado por <a href="https://aqirax.net" target="_blank">Aqirax</a> 
            <i class="fas fa-heart" style="color: #ec4899;"></i>
        </div>
    </div>

    <script>
        (function() {
            // Crear partículas flotantes mejoradas
            const body = document.body;
            const colores = ['rgba(255,255,255,0.2)', 'rgba(167,139,250,0.15)', 'rgba(236,72,153,0.1)'];
            
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = 4 + Math.random() * 12;
                const tx = (Math.random() - 0.5) * 80;
                const ty = (Math.random() - 0.5) * 80;
                const duracion = 8 + Math.random() * 12;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.setProperty('--duracion', duracion + 's');
                particle.style.background = colores[Math.floor(Math.random() * colores.length)];
                particle.style.animationDelay = `-${Math.random() * 10}s`;
                particle.style.boxShadow = `0 0 ${size * 3}px ${colores[Math.floor(Math.random() * colores.length)]}`;
                
                body.appendChild(particle);
            }

            // Efecto de seguimiento del mouse en botones
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    btn.style.setProperty('--x', x + '%');
                    btn.style.setProperty('--y', y + '%');
                });
            });
        })();
    </script>
</body>
</html>
