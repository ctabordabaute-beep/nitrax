<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitrax · Nitro gratis · by Aqirax</title>
    <!-- Meta tags para embed de Discord (color morado) -->
    <meta property="og:title" content="🌟 Nitrax · Regala Nitro · by Aqirax" />
    <meta property="og:description" content="Web que regala Nitro y vende cuentas. Desarrollado por Aqirax." />
    <meta property="og:color" content="#9b59b6" />
    <meta name="theme-color" content="#9b59b6" />
    <meta property="og:image" content="https://i.imgur.com/6Z1XJ8H.png" /> <!-- imagen de ejemplo -->
    <meta property="og:url" content="https://nitrax.xyz" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
            background-size: 400% 400%;
            animation: gradienteMovil 14s ease infinite alternate;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradienteMovil {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Fondo con partículas (animación sutil) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5), transparent);
            background-size: 200px 200px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
            animation: parpadeo 8s infinite alternate;
        }

        @keyframes parpadeo {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        /* Tarjeta principal - estilo "pro" */
        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 60px;
            padding: 3rem 2.8rem;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.25);
            text-align: center;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .card:hover {
            transform: scale(1.02) translateY(-10px);
            box-shadow: 0 60px 100px rgba(0, 0, 0, 0.4);
        }

        /* Logo / icono principal */
        .logo-icon {
            font-size: 4.5rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(155, 89, 182, 0.8);
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Título principal con efecto neón */
        .titulo-principal {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 20px rgba(155, 89, 182, 0.6), 0 0 60px rgba(155, 89, 182, 0.3);
            margin-bottom: 0.2rem;
            line-height: 1.1;
            word-break: break-word;
        }

        .titulo-principal span {
            background: linear-gradient(135deg, #ffffff, #f3e8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        .badge {
            display: inline-block;
            background: rgba(155, 89, 182, 0.35);
            backdrop-filter: blur(10px);
            padding: 0.3rem 1.6rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 1.8rem;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .badge i {
            margin-right: 8px;
            color: #fbbf24;
        }

        /* Descripción */
        .descripcion {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #1e1b2e;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 1.8rem 2rem;
            border-radius: 40px;
            margin: 1.8rem 0 2.2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .descripcion strong {
            color: #6b21a8;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.6);
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin: 0 4px;
        }

        .descripcion .highlight {
            color: #7c3aed;
            font-weight: 700;
        }

        .descripcion i {
            margin-right: 6px;
            color: #7c3aed;
        }

        /* Botones */
        .botones {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 1rem 2.6rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.15rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            color: #2d1b3d;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn i {
            font-size: 1.3rem;
        }

        .btn-primario {
            background: #8b5cf6;
            color: white;
            border: 1px solid #a78bfa;
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            font-weight: 800;
        }

        .btn-primario:hover {
            background: #7c3aed;
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.6);
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            border: 1px solid #7984f5;
            box-shadow: 0 12px 30px rgba(88, 101, 242, 0.5);
            font-weight: 800;
        }

        .btn-discord:hover {
            background: #4752c4;
            transform: scale(1.06) translateY(-4px);
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.6);
        }

        .btn-secundario {
            background: rgba(255, 215, 255, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .btn-secundario:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.05) translateY(-4px);
        }

        /* Footer / créditos */
        .footer-note {
            margin-top: 2.8rem;
            font-size: 0.95rem;
            color: #2d1b3d;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .footer-note i {
            margin: 0 8px;
            color: #7c3aed;
        }

        .footer-note a {
            color: #4c1d95;
            text-decoration: none;
            font-weight: 800;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
        }

        .footer-note a:hover {
            color: #2d0b66;
            border-bottom: 2px solid #7c3aed;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .card {
                padding: 2rem 1.5rem;
                border-radius: 40px;
            }
            .titulo-principal {
                font-size: 3.6rem;
            }
            .logo-icon {
                font-size: 3.5rem;
            }
            .badge {
                font-size: 0.9rem;
                padding: 0.2rem 1.2rem;
            }
            .descripcion {
                font-size: 1rem;
                padding: 1.2rem 1.2rem;
            }
            .btn {
                padding: 0.85rem 1.8rem;
                font-size: 1rem;
                width: 100%;
                justify-content: center;
            }
            .botones {
                flex-direction: column;
                width: 100%;
            }
            .footer-note {
                font-size: 0.85rem;
                padding: 0.6rem 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .titulo-principal {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Icono animado -->
        <div class="logo-icon">
            <i class="fas fa-gem"></i>
        </div>

        <!-- Título principal: "Nitrax" en blanco con efecto -->
        <h1 class="titulo-principal">
            <span>Nitrax</span>
        </h1>

        <div class="badge">
            <i class="fas fa-bolt"></i> REGALA NITRO · VENTA DE CUENTAS
        </div>

        <div class="descripcion">
            <i class="fas fa-gift"></i> <strong>Nitrax</strong> es la web que <strong>regala Nitro</strong> 
            y también <strong>vende cuentas</strong> con descuento. 
            <br><span class="highlight"><i class="fas fa-rocket"></i> ¡Consigue tu Nitro gratis ahora!</span>
        </div>

        <div class="botones">
            <a href="#" class="btn btn-primario" onclick="event.preventDefault(); alert('🎁 Nitro gratis en camino... (simulación)');">
                <i class="fas fa-gift"></i> Obtener Nitro
            </a>
            <a href="#" class="btn btn-secundario" onclick="event.preventDefault(); alert('🛒 Tienda de cuentas (simulación)');">
                <i class="fas fa-store"></i> Comprar cuenta
            </a>
            <!-- Botón join Discord que redirige a https://aqirax.net -->
            <a href="https://aqirax.net" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Unirse a Discord
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-code"></i> Desarrollado por <a href="https://aqirax.net" target="_blank">Aqirax</a> 
            <i class="fas fa-heart" style="color: #ec4899;"></i>
        </div>
    </div>

    <!-- Pequeño script para el efecto de partículas (mejora visual) -->
    <script>
        (function() {
            // Crear partículas flotantes adicionales (estilo "pro")
            const body = document.body;
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.width = '6px';
                particle.style.height = '6px';
                particle.style.background = 'rgba(255, 255, 255, 0.25)';
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '1';
                particle.style.filter = 'blur(2px)';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animation = `flotarParticula ${8 + Math.random() * 12}s ease-in-out infinite alternate`;
                particle.style.animationDelay = `-${Math.random() * 10}s`;
                particle.style.boxShadow = '0 0 20px rgba(155, 89, 182, 0.3)';
                body.appendChild(particle);
            }

            // Añadir keyframes dinámicamente para las partículas
            const styleSheet = document.createElement("style");
            styleSheet.textContent = `
                @keyframes flotarParticula {
                    0% { transform: translate(0px, 0px) scale(1); opacity: 0.3; }
                    100% { transform: translate(${Math.random() > 0.5 ? '' : '-'}30px, ${Math.random() > 0.5 ? '' : '-'}40px) scale(1.8); opacity: 0.8; }
                }
            `;
            document.head.appendChild(styleSheet);
        })();
    </script>
</body>
</html>
